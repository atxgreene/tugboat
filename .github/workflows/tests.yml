name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests (stdlib only, no install needed)
        run: python -m unittest discover tests -v

      - name: Run the demo
        run: python examples/basic_usage.py

      - name: Smoke-test the CLI
        run: |
          python -m tugboat explain examples/ben_policy.md "hi there" --task-class drafting
          python -m tugboat route   examples/ben_policy.md "tweet this" --external
